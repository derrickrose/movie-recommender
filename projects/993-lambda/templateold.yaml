                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-reserved/sso.amazonaws.com/eu-central-1/AWSReservedSSO_fr_test_data_engineer_0cdf13deb99966bf"
            - !Ref "AWS::NoValue" # If not test, no statement

          # This statement is only applied in the 'prod' environment.
          - !If
            - IsProd
            # Grant Admin access to the given principals
            - Sid: AllowAdminAccess
              Effect: Allow
              Principal: '*'
              Action: 's3:*'
              Resource:
                - !GetAtt AthenaQueryResultsBucket.Arn
                - !Sub "${AthenaQueryResultsBucket.Arn}/*"
              Condition:
