                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-reserved/sso.amazonaws.com/eu-central-1/AWSReservedSSO_fr-tessi-control-temp_571f4e267db2c7db"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-reserved/sso.amazonaws.com/eu-central-1/AWSReservedSSO_fr_prod_data_engineer_cc3919e7405e2c99"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-reserved/sso.amazonaws.com/eu-central-1/AWSReservedSSO_fr_prod_data_analyst_15ed2db26f45ffbc"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/after-banking-${Service}-${Env}-CloudFormationExecutionRole"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:user/ludovic.lempereur"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:user/geoffray.menudier"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/fr-${Env}-${AWS::Region}-restitution-stepfunction-exec-main-role"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/fr-${Env}-${AWS::Region}-migration-stepfunction-exec-main-role"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/fr-${Env}-${AWS::Region}-llm-tagging-stepfunctions-exec-main-role"
