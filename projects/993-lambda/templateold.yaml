      BucketName: !Sub "fr-${Env}-${AWS::Region}-after-banking-restitution"
      LoggingConfiguration:
        DestinationBucketName: !Ref CloudTrailBucketName
        LogFilePrefix: !Sub "ACCESS-LOGS/fr-${Env}-${AWS::Region}-after-banking-restitution-"
      # Ensure the bucket is private
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

      # Enable the versioning
      VersioningConfiguration:
        Status: Enabled

      # Enable the S3 Analytics
      AnalyticsConfigurations:
        - Id: DashboardAnalyticsConfig
          StorageClassAnalysis: {}
          Prefix: AnalyticsConfigurationPrefix

      # Encrypt the objects with SSE-KMS key
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: "aws:kms"             # the objects will be encrypted with the SSE-KMS key managed by AWS
              KMSMasterKeyID: "alias/aws/s3"
            BucketKeyEnabled: true

      # Lifecycle
      LifecycleConfiguration:
        Rules:
          # Move the objects greater than 128 KB to the Intellignet Tiering Storage Class
          - Id: MoveToIntelligentTieringAfter30Days
            Status: Enabled
            ObjectSizeGreaterThan: 131073 # bytes (this is the minimal allowed value) > 128 KB
            Transitions:
              - TransitionInDays: 30
                StorageClass: INTELLIGENT_TIERING

          - Id: PurgeObjectsAfter30Days
            Status: Enabled
            Prefix: ""
            ExpirationInDays: 30
            NoncurrentVersionExpirationInDays: 30

          - Id: DeleteAthenaQueryResultsAfter07Days
            Prefix: "athena_query_results/"
            Status: Enabled
            ExpirationInDays: 7
            NoncurrentVersionExpirationInDays: 7

          - Id: DeleteTempFoldersAfter07Days
            Prefix: "temp_folders/"
            Status: Enabled
            ExpirationInDays: 7
            NoncurrentVersionExpirationInDays: 7

  RestitutionBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref RestitutionBucket
      PolicyDocument:
        Statement:
          # Only SSL requests are allowed
          - Sid: AllowSSLRequestsOnly
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt RestitutionBucket.Arn
              - !Sub "${RestitutionBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: 'false'
          # Grant Access to the Root Account
          - Sid: AllowRootAccountAccess
            Effect: Allow
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt RestitutionBucket.Arn
              - !Sub "${RestitutionBucket.Arn}/*"
            Condition:
              StringEquals:
                  aws:userId: !Sub ${AWS::AccountId}

          # This statement is only applied in the 'test' environment.
          - !If
            - IsTest
            # Grant Admin access to the given principals
            - Sid: AllowAdminAccess
              Effect: Allow
              Principal: '*'
              Action: 's3:*'
              Resource:
                - !GetAtt RestitutionBucket.Arn
                - !Sub "${RestitutionBucket.Arn}/*"
              Condition:
                ArnEquals:
                  aws:PrincipalArn:
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-reserved/sso.amazonaws.com/eu-central-1/AWSReservedSSO_fr-prod-eu-central-1-admin_f4c13ac1ef030905"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/after-banking-${Service}-${Env}-CloudFormationExecutionRole"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:user/ludovic.lempereur"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:user/geoffray.menudier"
            - !Ref "AWS::NoValue" # If not test, no statement

