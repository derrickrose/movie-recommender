                - s3:PutObject
              Resource:
                - !GetAtt AthenaQueryResultsBucket.Arn
                - !Sub "${AthenaQueryResultsBucket.Arn}/*"
              Condition:
                StringEquals:
                  aws:calledViaLast: athena.amazonaws.com
                ArnEquals:
