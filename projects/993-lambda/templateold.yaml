  # The gold bucket
  GoldBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "fr-${Env}-${AWS::Region}-after-banking-gold"
      LoggingConfiguration:
        DestinationBucketName: !Ref CloudTrailBucketName
        LogFilePrefix: !Sub "ACCESS-LOGS/fr-${Env}-${AWS::Region}-after-banking-gold-"
      # Ensure the bucket is private
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
