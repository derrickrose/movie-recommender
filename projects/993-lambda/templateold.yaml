---
AWSTemplateFormatVersion: 2010-09-09
Description: Deploy the after banking platform with the protected resources (S3 buckets)

Metadata:
  Version: 1.0.9

Parameters:
  # List of environments
  Env:
    Type: String
    Description: The name of the stack environment
    Default: test
    AllowedValues:
      - test
      - prod
      - dev

  Service:
    Type: String
    Description: Service
    Default: restitution

  CloudTrailBucketName:
    Type: String
    Description: Name of the S3 bucket used for centralized S3 Buckets logging
    Default: aws-cloudtrail-logs-905418166282-eu-central-1

Conditions:
  IsTest: !Equals [ !Ref Env, 'test' ]
  IsDev: !Equals [ !Ref Env, 'dev' ]
  IsProd: !Equals [ !Ref Env, 'prod' ]

Resources:
  # Amazon Athena automatically stores query results and metadata information in an S3 bucket
  # we use a separeted bucket for this purpose
  AthenaQueryResultsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "fr-${Env}-${AWS::Region}-after-banking-athena-query-results"

      # Ensure the bucket is private
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

      # Enable the versioning
      VersioningConfiguration:
        Status: Enabled

      # Enable the S3 Analytics
      AnalyticsConfigurations:
        - Id: DashboardAnalyticsConfig
          StorageClassAnalysis: {}
          Prefix: AnalyticsConfigurationPrefix

      # Encrypt the objects with SSE-KMS key
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: "aws:kms"             # the objects will be encrypted with the SSE-KMS key managed by AWS
              KMSMasterKeyID: "alias/aws/s3"
            BucketKeyEnabled: true

      # Lifecycle
      LifecycleConfiguration:
        Rules:
          # Move the objects greater than 128 KB to the Intellignet Tiering Storage Class
          - Id: MoveToIntelligentTieringAfter30Days
            Status: Enabled
            ObjectSizeGreaterThan: 131073 # bytes (this is the minimal allowed value) > 128 KB
            Transitions:
              - TransitionInDays: 30
                StorageClass: INTELLIGENT_TIERING

          - Id: PurgeObjectsAfter30Days
            Status: Enabled
            Prefix: ""
            ExpirationInDays: 30
            NoncurrentVersionExpirationInDays: 30

  AthenaQueryResultsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AthenaQueryResultsBucket
      PolicyDocument:
        Statement:
          # Only SSL requests are allowed
          - Sid: AllowSSLRequestsOnly
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt AthenaQueryResultsBucket.Arn
            Condition:
              Bool:
                aws:SecureTransport: 'false'

          # Grant Access to the Root Account
          - Sid: AllowRootAccountAccess
            Effect: Allow
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt AthenaQueryResultsBucket.Arn
              - !Sub "${AthenaQueryResultsBucket.Arn}/*"
            Condition:
              StringEquals:
                  aws:userId: !Sub ${AWS::AccountId}

          # This statement is only applied in the 'test' environment.
          - !If
            - IsTest
            # Grant Admin access to the given principals
            - Sid: AllowAdminAccess
              Effect: Allow
              Principal: '*'
              Action: 's3:*'
              Resource:
                - !GetAtt AthenaQueryResultsBucket.Arn
                - !Sub "${AthenaQueryResultsBucket.Arn}/*"
              Condition:
                ArnEquals:
                  aws:PrincipalArn:
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-reserved/sso.amazonaws.com/eu-central-1/AWSReservedSSO_fr-prod-eu-central-1-admin_f4c13ac1ef030905"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/after-banking-${Service}-${Env}-CloudFormationExecutionRole"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:user/ludovic.lempereur"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:user/geoffray.menudier"
            - !Ref "AWS::NoValue" # If not test, no statement

          # Deny Access to all users except specified ones
          # This statement is only applied in the 'test' environment.
          - !If
            - IsTest
            - Sid: DenyAllButAllowedUser
              Effect: Deny
              Principal: '*'
              Action: 's3:*'
              Resource:
                - !GetAtt AthenaQueryResultsBucket.Arn
                - !Sub "${AthenaQueryResultsBucket.Arn}/*"
              Condition:
                StringNotEquals:
                  aws:userId: !Sub ${AWS::AccountId}
                ArnNotEquals:
                  aws:PrincipalArn:
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-reserved/sso.amazonaws.com/eu-central-1/AWSReservedSSO_fr_test_data_engineer_0cdf13deb99966bf"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-reserved/sso.amazonaws.com/eu-central-1/AWSReservedSSO_fr-prod-eu-central-1-admin_f4c13ac1ef030905"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/after-banking-${Service}-${Env}-CloudFormationExecutionRole"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/service-role/aws-quicksight-s3-consumers-role-v0"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/fr-${Env}-${AWS::Region}-restitution-stepfunction-exec-main-role"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/fr-${Env}-${AWS::Region}-migration-stepfunction-exec-main-role"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/fr-${Env}-${AWS::Region}-llm-tagging-stepfunctions-exec-main-role"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:user/ludovic.lempereur"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:user/geoffray.menudier"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/fr-${Env}-${AWS::Region}-zip-lambda-exec-role"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/fr-${Env}-${AWS::Region}-inventory-tagging-lambda-exec-role"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/fr-${Env}-${AWS::Region}-tessi-raw-to-intermediate-lambda-ex-role"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/fr-${Env}-${AWS::Region}-migration-stepfunction-exec-main-role-2"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/fr-${Env}-${AWS::Region}-loancession-stepfunction-exec-main-role"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/fr-${Env}-${AWS::Region}-loancession-stepfunction-exec-main-role-opt"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/fr-${Env}-${AWS::Region}-common-create-view-lambda-exec-role"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/fr-${Env}-${AWS::Region}-unload-partitioned-data-lambda-ex-role"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/fr-${Env}-${AWS::Region}-purge-stepfunction-exec-main-role"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/fr-${Env}-${AWS::Region}-afterbanking-promote-to-gold-sfn-exec-role"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/fr-${Env}-${AWS::Region}-purge-client-doc-lambda-exec-role"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/fr-${Env}-${AWS::Region}-afterbanking-purge-client-doc-sfn-exec-role"
                    - !Sub "arn:aws:iam::${AWS::AccountId}:role/fr-${Env}-${AWS::Region}-promote-rattrapage-role"

            - !Ref "AWS::NoValue" # If not test, no statement

          # Deny Access to all users except admin and specified ones
          # This statement is only applied in the 'test' environment
          - !If
            - IsTest
            - Sid: DenyWriteAllButAdminAndRootUsers
              Effect: Deny
              Principal: '*'
